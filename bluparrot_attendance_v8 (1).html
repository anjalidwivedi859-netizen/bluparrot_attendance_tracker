<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:transparent;color:var(--color-text-primary);font-size:14px}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.shell{display:flex;height:100vh;min-height:600px;overflow:hidden}
.sidebar{width:196px;flex-shrink:0;border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;padding:16px 0}

.badge-present{background:#E1F5EE;color:#085041}.badge-absent{background:#FCEBEB;color:#791F1F}.badge-wfh{background:#E6F1FB;color:#0C447C}.badge-leave{background:#FAEEDA;color:#633806}.badge-neutral{background:var(--color-background-secondary);color:var(--color-text-secondary)}

<h2 class="sr-only">BluParrot Ventures attendance dashboard</h2>
<div id="modal-root"></div>
<div class="shell" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const AVC=[{bg:'#E1F5EE',color:'#085041'},{bg:'#E6F1FB',color:'#0C447C'},{bg:'#FBEAF0',color:'#72243E'},{bg:'#FAEEDA',color:'#633806'},{bg:'#EEEDFE',color:'#3C3489'},{bg:'#FCEBEB',color:'#791F1F'}];
const ac=i=>AVC[i%AVC.length];
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const todayStr=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`};
const localDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtMonth=(y,m)=>new Date(y,m,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const nowTime=()=>{const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`};
const escHtml=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const now=new Date();
let state={
  employees:[],records:{},
  selectedDate:todayStr(),selectedEmp:null,view:'daily',page:'attendance',dlOpen:false,
  viewYear:now.getFullYear(),viewMonth:now.getMonth(),
  searchQuery:'',searchError:false,
  editingEmpId:null,
  confirmDeleteId:null,
  uploadModal:null
};

const SEMP=[
  {id:'e1',name:'Arjun Mehta',role:'Software Engineer',dept:'Engineering'},
  {id:'e2',name:'Priya Singh',role:'Product Manager',dept:'Product'},
  {id:'e3',name:'Rohan Das',role:'Designer',dept:'Design'},
  {id:'e4',name:'Kavya Nair',role:'HR Executive',dept:'HR'},
  {id:'e5',name:'Vivek Sharma',role:'Business Analyst',dept:'Operations'},
  {id:'e6',name:'Ananya Gupta',role:'DevOps Engineer',dept:'Engineering'},
];
const STSTUS=['present','present','present','present','wfh','absent','leave'];

function seedRecs(emps){
  const recs={};
  emps.forEach(emp=>{
    recs[emp.id]={};
    const base=new Date(state.viewYear,state.viewMonth,1);
    for(let i=0;i<28;i++){
      const d=new Date(base);d.setDate(i+1);
      if(d.getMonth()!==state.viewMonth||d>new Date()||d.getDay()===0||d.getDay()===6)continue;
      const ds=localDateStr(d);
      const st=STSTUS[Math.floor(Math.random()*STSTUS.length)];
      let cin=null,cout=null;
      if(st==='present'||st==='wfh'){
        const hr=8+Math.floor(Math.random()*2),mn=Math.random()<.3?30:Math.floor(Math.random()*30);
        cin=`${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
        const tot=hr*60+mn+(7.5+Math.random()*2)*60;
        cout=`${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(Math.floor(tot%60)).padStart(2,'0')}`;
      }
      recs[emp.id][ds]={status:st,clockIn:cin,clockOut:cout};
    }
  });
  return recs;
}
/* ─── SUPABASE CONFIG ───────────────────────────────────────────────────────
   Replace the two placeholder strings below with your actual Supabase project
   URL and anon/public key. You can find them in:
   Supabase Dashboard → Your Project → Settings → API
   ─────────────────────────────────────────────────────────────────────────── */
const SUPABASE_URL  = 'https://ltmyhliwsqpgndvdpfrx.supabase.co';
const SUPABASE_ANON = 'sb_publishable_HlzttAQmyQB-XbxEJhsG3A_gT0_Ilab';

/* ─── DB STATUS ─────────────────────────────────────────────────────────── */
let sb = null;          // Supabase client (null = not configured yet)
let dbOnline = false;   // true once we confirm Supabase is reachable
let dbStatus = 'unconfigured'; // 'unconfigured' | 'connecting' | 'online' | 'offline'
let pendingSync = [];   // queue of writes that happened while offline

function isConfigured(){
  return SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON !== 'YOUR_SUPABASE_ANON_KEY';
}

async function initSupabase(){
  if(!isConfigured()){dbStatus='unconfigured';renderDbBadge();return;}
  try{
    dbStatus='connecting';renderDbBadge();
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    // Probe connection with a lightweight query
    const {error} = await sb.from('employees').select('id').limit(1);
    if(error) throw error;
    dbOnline=true;dbStatus='online';
    renderDbBadge();
    // Flush any pending writes accumulated while offline
    await flushPending();
  }catch(e){
    dbOnline=false;dbStatus='offline';
    console.warn('BluParrot: Supabase unreachable, running on localStorage.',e.message||e);
    renderDbBadge();
  }
}

function renderDbBadge(){
  const el=document.getElementById('db-status-badge');
  if(!el)return;
  const map={
    unconfigured:{icon:'ti-database-off', color:'#854F0B', bg:'#FAEEDA', tip:'Supabase not configured — using localStorage'},
    connecting:  {icon:'ti-loader-2',     color:'#185FA5', bg:'#E6F1FB', tip:'Connecting to Supabase…'},
    online:      {icon:'ti-database',     color:'#085041', bg:'#E1F5EE', tip:'Supabase connected'},
    offline:     {icon:'ti-database-x',   color:'#A32D2D', bg:'#FCEBEB', tip:'Supabase offline — changes saved locally'},
  };
  const s=map[dbStatus]||map.unconfigured;
  el.style.cssText=`display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;background:${s.bg};color:${s.color};cursor:default;user-select:none`;
  el.title=s.tip;
  el.innerHTML=`<i class="ti ${s.icon}" style="font-size:13px"></i>${dbStatus==='connecting'?'Connecting…':dbStatus.charAt(0).toUpperCase()+dbStatus.slice(1)}`;
}

/* ─── LOCALSTORAGE (fallback / cache) ───────────────────────────────────── */
function saveLS(){
  try{
    localStorage.setItem('bp_emp',JSON.stringify(state.employees));
    localStorage.setItem('bp_rec',JSON.stringify(state.records));
  }catch{}
}
function loadFromLS(){
  try{
    const e=localStorage.getItem('bp_emp'),r=localStorage.getItem('bp_rec');
    if(e){state.employees=JSON.parse(e);state.records=JSON.parse(r||'{}');return true;}
  }catch{}
  return false;
}

/* ─── SUPABASE READ ─────────────────────────────────────────────────────── */
async function loadFromSupabase(){
  try{
    const [empRes, recRes] = await Promise.all([
      sb.from('employees').select('*').order('name'),
      sb.from('attendance_records').select('*')
    ]);
    if(empRes.error) throw empRes.error;
    if(recRes.error) throw recRes.error;

    // Map flat DB rows → app state shape
    state.employees = empRes.data.map(r=>({id:r.id, name:r.name, role:r.role||'', dept:r.dept||''}));
    state.records = {};
    recRes.data.forEach(r=>{
      if(!state.records[r.employee_id]) state.records[r.employee_id]={};
      state.records[r.employee_id][r.date]={status:r.status,clockIn:r.clock_in,clockOut:r.clock_out};
    });
    saveLS(); // cache to localStorage
    return true;
  }catch(e){
    console.warn('BluParrot: Supabase load failed, falling back to localStorage.',e.message||e);
    dbOnline=false;dbStatus='offline';renderDbBadge();
    return false;
  }
}

/* ─── MAIN LOAD ─────────────────────────────────────────────────────────── */
async function loadLS(){
  // Always load from localStorage first so the UI is instant
  const hadLocal = loadFromLS();
  if(!hadLocal){state.employees=SEMP;state.records=seedRecs(SEMP);saveLS();}
  render(); // first paint immediately

  await initSupabase();

  if(dbOnline){
    const loaded = await loadFromSupabase();
    if(loaded) render(); // re-paint with fresh DB data
  }
}

/* ─── SUPABASE WRITE HELPERS ────────────────────────────────────────────── */
async function sbUpsertEmployee(emp){
  if(!sb||!dbOnline) return;
  try{
    const {error}=await sb.from('employees').upsert({id:emp.id,name:emp.name,role:emp.role||'',dept:emp.dept||''},{onConflict:'id'});
    if(error) throw error;
  }catch(e){console.warn('sbUpsertEmployee failed:',e.message||e);dbOnline=false;dbStatus='offline';renderDbBadge();}
}
async function sbDeleteEmployee(id){
  if(!sb||!dbOnline) return;
  try{
    const {error}=await sb.from('employees').delete().eq('id',id);
    if(error) throw error;
  }catch(e){console.warn('sbDeleteEmployee failed:',e.message||e);}
}
async function sbUpsertRecord(empId,date,rec){
  if(!sb||!dbOnline) return;
  try{
    const {error}=await sb.from('attendance_records').upsert(
      {employee_id:empId,date,status:rec.status,clock_in:rec.clockIn,clock_out:rec.clockOut},
      {onConflict:'employee_id,date'}
    );
    if(error) throw error;
  }catch(e){console.warn('sbUpsertRecord failed:',e.message||e);dbOnline=false;dbStatus='offline';renderDbBadge();pendingSync.push({type:'record',empId,date,rec});}
}
async function sbUpsertEmployees(emps){
  if(!sb||!dbOnline) return;
  try{
    const rows=emps.map(e=>({id:e.id,name:e.name,role:e.role||'',dept:e.dept||''}));
    const {error}=await sb.from('employees').upsert(rows,{onConflict:'id'});
    if(error) throw error;
  }catch(e){console.warn('sbUpsertEmployees failed:',e.message||e);}
}
async function flushPending(){
  if(!pendingSync.length) return;
  const todo=[...pendingSync];pendingSync=[];
  for(const op of todo){
    if(op.type==='record') await sbUpsertRecord(op.empId,op.date,op.rec);
  }
}

/* ─── RECORD ACCESSORS ──────────────────────────────────────────────────── */
function getR(id,date){return(state.records[id]||{})[date]||{status:null,clockIn:null,clockOut:null}}
function setR(id,date,data){
  if(!state.records[id])state.records[id]={};
  const merged={...getR(id,date),...data};
  state.records[id][date]=merged;
  saveLS();
  sbUpsertRecord(id,date,merged); // fire-and-forget, gracefully handles offline
  render();
}
function dailyHrs(id,date){
  const r=getR(id,date);if(!r.clockIn||!r.clockOut)return 0;
  const[h1,m1]=r.clockIn.split(':').map(Number),[h2,m2]=r.clockOut.split(':').map(Number);
  return Math.max(0,((h2*60+m2)-(h1*60+m1))/60);
}
function monthlyHrs(id,y,m){
  const base=new Date(y,m,1);let t=0;
  for(let i=0;i<31;i++){const d=new Date(base);d.setDate(i+1);if(d.getMonth()!==m)break;t+=dailyHrs(id,localDateStr(d));}
  return t;
}
function mCounts(id,y,m){
  const base=new Date(y,m,1);let p=0,a=0,w=0,l=0,days=0;
  for(let i=0;i<31;i++){
    const d=new Date(base);d.setDate(i+1);
    if(d.getMonth()!==m||d>new Date())break;
    if(d.getDay()===0||d.getDay()===6)continue;
    days++;
    const s=getR(id,localDateStr(d)).status;
    if(s==='present')p++;else if(s==='wfh')w++;else if(s==='leave')l++;else if(s==='absent')a++;
  }
  return{present:p,absent:a,wfh:w,leave:l,days};
}

function filteredEmployees(){
  const q=state.searchQuery.trim();
  if(!q){state.searchError=false;return state.employees;}
  try{
    const rx=new RegExp(q,'i');state.searchError=false;
    return state.employees.filter(e=>rx.test(e.name)||rx.test(e.role)||rx.test(e.dept));
  }catch{state.searchError=true;return state.employees;}
}
function highlightMatch(text){
  const q=state.searchQuery.trim();
  if(!q||state.searchError)return escHtml(text);
  try{const rx=new RegExp(`(${q})`,'gi');return escHtml(text).replace(rx,'<mark class="highlight">$1</mark>');}
  catch{return escHtml(text);}
}

function statusBadge(s){
  if(!s)return`<span class="badge badge-neutral">—</span>`;
  const m={present:{cls:'badge-present',icon:'ti-check',label:'Present'},absent:{cls:'badge-absent',icon:'ti-x',label:'Absent'},wfh:{cls:'badge-wfh',icon:'ti-home',label:'WFH'},leave:{cls:'badge-leave',icon:'ti-calendar-off',label:'Leave'}}[s];
  return m?`<span class="badge ${m.cls}"><i class="ti ${m.icon}" aria-hidden="true"></i>${m.label}</span>`:`<span class="badge badge-neutral">—</span>`;
}
function hoursBar(h,max=9){
  const p=Math.min(100,Math.round(h/max*100));
  return`<div class="hours-bar-wrap"><div class="hours-bar"><div class="hours-bar-fill" style="width:${p}%"></div></div><span class="hours-val">${h.toFixed(1)}h</span></div>`;
}
function rowClass(s){if(s==='absent')return' row-absent';if(s==='leave')return' row-leave';return'';}
function monthOptions(){
  const opts=[];const cur=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(cur.getFullYear(),cur.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth();
    const sel=(y===state.viewYear&&m===state.viewMonth)?'selected':'';
    opts.push(`<option value="${y}-${m}" ${sel}>${d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</option>`);
  }
  return opts.join('');
}

function dlDayXlsx(){
  const date=state.selectedDate;
  const rows=state.employees.map(emp=>{
    const r=getR(emp.id,date);const h=dailyHrs(emp.id,date);
    return{Employee:emp.name,Role:emp.role,Department:emp.dept,Date:fmtDate(date),Status:r.status||'—','Clock In':r.clockIn||'—','Clock Out':r.clockOut||'—','Hours Worked':h>0?parseFloat(h.toFixed(2)):''};
  });
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:22},{wch:20},{wch:16},{wch:14},{wch:10},{wch:10},{wch:10},{wch:14}];

function dlEmpXlsx(empId){
  const emp=state.employees.find(e=>e.id===empId);if(!emp)return;
  const y=state.viewYear,m=state.viewMonth;const base=new Date(y,m,1);const rows=[];
  for(let i=0;i<31;i++){
    const d=new Date(base);d.setDate(i+1);if(d.getMonth()!==m)break;
    const ds=localDateStr(d);if(d.getDay()===0||d.getDay()===6)continue;
    const r=getR(emp.id,ds);const h=dailyHrs(emp.id,ds);
    rows.push({Date:fmtDate(ds),Day:d.toLocaleDateString('en-IN',{weekday:'short'}),Status:r.status||'—','Clock In':r.clockIn||'—','Clock Out':r.clockOut||'—','Hours Worked':h>0?parseFloat(h.toFixed(2)):''});
  }
  const c=mCounts(empId,y,m);const mh=monthlyHrs(empId,y,m);
  rows.push({Date:'TOTAL',Day:'',Status:'','Clock In':'','Clock Out':'','Hours Worked':parseFloat(mh.toFixed(2))});
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:16},{wch:8},{wch:10},{wch:10},{wch:10},{wch:14}];
  const infoWs=XLSX.utils.aoa_to_sheet([['Employee',emp.name],['Role',emp.role],['Department',emp.dept],['Month',fmtMonth(y,m)],['Present',c.present],['WFH',c.wfh],['Leave',c.leave],['Absent',c.absent],['Total Hours',parseFloat(mh.toFixed(2))]]);
  infoWs['!cols']=[{wch:16},{wch:22}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,infoWs,'Summary');XLSX.utils.book_append_sheet(wb,ws,'Daily Log');
  XLSX.writeFile(wb,`BluParrot_${emp.name.replace(/ /g,'_')}_${y}-${String(m+1).padStart(2,'0')}.xlsx`);closeDl();
}
function closeDl(){state.dlOpen=false;render()}

/* Upload modal */
function handleUpload(e){
  const file=e.target.files[0];if(!file)return;
  e.target.value='';
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    const parsed=[];
    lines.forEach((line,i)=>{
      if(i===0&&line.toLowerCase().includes('name'))return;
      const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      if(p[0])parsed.push({id:'e'+Date.now()+i,name:p[0],role:p[1]||'',dept:p[2]||''});
    });
    if(parsed.length===0){alert('No employees found. Format: Name, Role, Department');return;}
    if(state.employees.length===0){
      applyUpload(parsed,'replace');return;
    }
    state.uploadModal={parsed,mode:'add'};render();
  };
  reader.readAsText(file);
}

function setUploadMode(mode){state.uploadModal={...state.uploadModal,mode};render();}

function confirmUpload(){
  const{parsed,mode}=state.uploadModal;
  applyUpload(parsed,mode);
}

function applyUpload(parsed,mode){
  if(mode==='replace'){
    state.employees=parsed;
    state.records={};
    parsed.forEach(emp=>{state.records[emp.id]={}});
    if(state.selectedEmp&&!parsed.find(e=>e.id===state.selectedEmp))state.selectedEmp=null;
  } else {
    const existingNames=new Set(state.employees.map(e=>e.name.toLowerCase()));
    const newOnes=parsed.filter(e=>!existingNames.has(e.name.toLowerCase()));
    const skipped=parsed.length-newOnes.length;
    state.employees=[...state.employees,...newOnes];
    newOnes.forEach(emp=>{if(!state.records[emp.id])state.records[emp.id]={};});
    if(skipped>0)setTimeout(()=>alert(`${skipped} duplicate(s) skipped (same name already exists).`),100);
  }
  state.uploadModal=null;saveLS();sbUpsertEmployees(state.employees);render();
}

function cancelUpload(){state.uploadModal=null;render();}

function render(){
  document.getElementById('app').innerHTML=renderShell();

  mr.innerHTML=state.uploadModal?renderUploadModal():'';

    const si=document.getElementById('search-input');

}

  <div class="monthly-grid">${emps.map(emp=>{
    const c=mCounts(emp.id,y,m),mh=monthlyHrs(emp.id,y,m),avc=ac(state.employees.indexOf(emp));
    return`<div class="emp-month-card" onclick="selectEmp('${emp.id}')"><div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div class="avatar" style="background:${avc.bg};color:${avc.color};width:34px;height:34px;font-size:12px">${ini(emp.name)}</div><div><div class="emp-name" style="font-size:13px">${highlightMatch(emp.name)}</div><div class="emp-role">${highlightMatch(emp.role)}</div></div></div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px"><span class="badge badge-present">${c.present}P</span><span class="badge badge-absent">${c.absent}A</span><span class="badge badge-wfh">${c.wfh}W</span><span class="badge badge-leave">${c.leave}L</span></div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:3px">Monthly hours</div>${hoursBar(mh,160)}</div>`;
  }).join('')}</div></div>`;
}

function renderEmpPage(){
  const emps=filteredEmployees();const y=state.viewYear,m=state.viewMonth;
  return`<div class="content"><div class="sec-hdr"><div class="sec-hdr-left"><span class="sec-title">${state.employees.length} employees</span>${renderSearchBar('Search by name, role, department...')}</div><button class="btn btn-primary" onclick="addEmpPrompt()"><i class="ti ti-plus" aria-hidden="true"></i>Add employee</button></div>
  <div class="table-wrap"><table><thead><tr><th style="width:24%">Name</th><th style="width:20%">Role</th><th style="width:16%">Department</th><th style="width:11%">Present%</th><th style="width:11%">Monthly hrs</th><th style="width:18%">Actions</th></tr></thead><tbody>
  ${emps.length===0?`<tr><td colspan="6" class="no-results"><i class="ti ti-search-off" aria-hidden="true"></i> No match for "${escHtml(state.searchQuery)}"</td></tr>`:''}
  ${emps.map(emp=>{
    const idx=state.employees.indexOf(emp);
    const c=mCounts(emp.id,y,m),pct=c.days>0?Math.round((c.present+c.wfh)/c.days*100):0,mh=monthlyHrs(emp.id,y,m),avc=ac(idx);
    const isEditing=state.editingEmpId===emp.id;
    const isConfirmDelete=state.confirmDeleteId===emp.id;

    if(isEditing){
      return`<tr>
        <td><div class="emp-cell"><div class="avatar" style="background:${avc.bg};color:${avc.color}">${ini(emp.name)}</div><input class="edit-input" id="edit-name" value="${escHtml(emp.name)}" placeholder="Full name"></td>
        <td><input class="edit-input" id="edit-role" value="${escHtml(emp.role)}" placeholder="Role"></td>
        <td><input class="edit-input" id="edit-dept" value="${escHtml(emp.dept)}" placeholder="Department"></td>
        <td colspan="2" style="color:var(--color-text-secondary);font-size:11px">editing…</td>
        <td><div style="display:flex;gap:4px"><button class="btn btn-primary btn-sm" onclick="saveEdit('${emp.id}')"><i class="ti ti-check" aria-hidden="true"></i>Save</button><button class="btn btn-neutral btn-sm" onclick="cancelEdit()"><i class="ti ti-x" aria-hidden="true"></i></button></div></td>
      </tr>`;
    }

    if(isConfirmDelete){
      return`<tr class="row-absent">
        <td colspan="4"><div class="del-confirm"><i class="ti ti-alert-triangle" style="font-size:14px;color:#A32D2D" aria-hidden="true"></i><span>Remove <strong>${escHtml(emp.name)}</strong> and all their attendance data?</span></div></td>
        <td colspan="2"><div style="display:flex;gap:5px;justify-content:flex-end"><button class="btn btn-danger btn-sm" onclick="confirmDelete('${emp.id}')"><i class="ti ti-trash" aria-hidden="true"></i>Yes, remove</button><button class="btn btn-neutral btn-sm" onclick="cancelDelete()">Cancel</button></div></td>
      </tr>`;
    }

    return`<tr class="clickable" onclick="selectEmp('${emp.id}')">
      <td><div class="emp-cell"><div class="avatar" style="background:${avc.bg};color:${avc.color}">${ini(emp.name)}</div><div class="emp-name">${highlightMatch(emp.name)}</div></div></td>
      <td style="color:var(--color-text-secondary)">${highlightMatch(emp.role)}</td>
      <td><span class="badge badge-neutral">${highlightMatch(emp.dept)}</span></td>
      <td><span style="font-size:13px;font-weight:500">${pct}%</span></td>
      <td>${hoursBar(mh,160)}</td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:4px">
        <button class="btn btn-amber btn-sm" onclick="startEdit('${emp.id}')"><i class="ti ti-edit" aria-hidden="true"></i>Edit</button>
        <button class="btn btn-danger btn-sm" onclick="askDelete('${emp.id}')"><i class="ti ti-trash" aria-hidden="true"></i>Remove</button>
      </div></td>
    </tr>`;
  }).join('')}
  </tbody></table></div></div>`;
}

function renderDetailPanel(){
  const emp=state.employees.find(e=>e.id===state.selectedEmp);if(!emp)return'';
  const i=state.employees.indexOf(emp),avc=ac(i);
  const y=state.viewYear,m=state.viewMonth;
  const c=mCounts(emp.id,y,m),mh=monthlyHrs(emp.id,y,m);
  const r=getR(emp.id,state.selectedDate),h=dailyHrs(emp.id,state.selectedDate);
  const base=new Date(y,m,1);let calDays='';
  const fdow=base.getDay();
  for(let j=0;j<fdow;j++)calDays+=`<div class="mcd" style="background:transparent"></div>`;
  for(let j=0;j<31;j++){
    const d=new Date(base);d.setDate(j+1);if(d.getMonth()!==m)break;
    if(d>new Date()){calDays+=`<div class="mcd" style="opacity:.25;font-size:9px;color:var(--color-text-secondary)">${j+1}</div>`;continue;}
    if(d.getDay()===0||d.getDay()===6){calDays+=`<div class="mcd" style="color:var(--color-border-secondary);font-size:9px">${j+1}</div>`;continue;}
    const ds=localDateStr(d);const s=getR(emp.id,ds).status;
    const cls=s?({present:'mc-p',absent:'mc-a',wfh:'mc-w',leave:'mc-l'}[s]||''):'';
    calDays+=`<div class="mcd ${cls}">${j+1}</div>`;
  }
  return`<div class="detail-panel open"><div class="detail-close"><span style="font-size:12px;font-weight:500">Detail</span><button onclick="state.selectedEmp=null;render()" aria-label="Close"><i class="ti ti-x" aria-hidden="true"></i></button></div>
  <div class="det-avatar" style="background:${avc.bg};color:${avc.color}">${ini(emp.name)}</div>
  <div class="det-name">${escHtml(emp.name)}</div><div class="det-role">${escHtml(emp.role)} · ${escHtml(emp.dept)}</div>
  <div class="det-sec"><div class="det-sec-title">Today (${fmtDate(state.selectedDate)})</div>
    <div class="det-row"><span class="k">Status</span>${statusBadge(r.status)}</div>
    <div class="det-row"><span class="k">Clock In</span><span>${r.clockIn||'—'}</span></div>
    <div class="det-row"><span class="k">Clock Out</span><span>${r.clockOut||'—'}</span></div>
    <div class="det-row"><span class="k">Hours</span><span>${h>0?h.toFixed(1)+'h':'—'}</span></div>
  </div>
  <div class="det-sec"><div class="det-sec-title">${fmtMonth(y,m)}</div>
    <div class="det-row"><span class="k">Present</span><span>${c.present}d</span></div>
    <div class="det-row"><span class="k">WFH</span><span>${c.wfh}d</span></div>
    <div class="det-row"><span class="k">Leave</span><span>${c.leave}d</span></div>
    <div class="det-row"><span class="k">Absent</span><span>${c.absent}d</span></div>
    <div class="det-row"><span class="k">Total hrs</span><span>${mh.toFixed(1)}h</span></div>
  </div>
  <div class="det-sec"><div class="det-sec-title">Attendance calendar</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:9px;color:var(--color-text-secondary);padding:2px 0">${d}</div>`).join('')}</div>
    <div class="mini-cal">${calDays}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px"><span class="badge badge-present" style="font-size:10px">P</span><span class="badge badge-wfh" style="font-size:10px">WFH</span><span class="badge badge-absent" style="font-size:10px">A</span><span class="badge badge-leave" style="font-size:10px">L</span></div>
  </div>
  <div class="det-sec"><div class="det-sec-title">Update clock times</div>
    <div style="display:flex;gap:5px;margin-bottom:7px">
      <input type="time" id="cin-inp" value="${r.clockIn||''}" style="flex:1;font-size:12px;height:28px;padding:0 5px;border-radius:var(--border-radius-md)">
      <span style="font-size:11px;color:var(--color-text-secondary);align-self:center">→</span>
      <input type="time" id="cout-inp" value="${r.clockOut||''}" style="flex:1;font-size:12px;height:28px;padding:0 5px;border-radius:var(--border-radius-md)">
    </div>
    <button class="btn btn-neutral" style="width:100%;justify-content:center;font-size:12px" onclick="saveClockTimes('${emp.id}','${state.selectedDate}')">Save times</button>
  </div>
  <div class="det-sec">
    <button class="btn btn-info" style="width:100%;justify-content:center;font-size:12px" onclick="dlEmpXlsx('${emp.id}')"><i class="ti ti-download" aria-hidden="true"></i>Export xlsx</button>
  </div></div>`;
}

/* Actions */
function setPage(p){state.page=p;state.editingEmpId=null;state.confirmDeleteId=null;render()}
function setView(v){state.view=v;render()}
function selectEmp(id){state.selectedEmp=state.selectedEmp===id?null:id;render()}
function switchMonth(val){const[y,m]=val.split('-').map(Number);state.viewYear=y;state.viewMonth=m;render()}
function handleSearch(val){state.searchQuery=val;render()}
function startEdit(id){state.editingEmpId=id;state.confirmDeleteId=null;state.selectedEmp=null;render();setTimeout(()=>document.getElementById('edit-name')?.focus(),0);}
function cancelEdit(){state.editingEmpId=null;render()}
function saveEdit(id){
  const name=document.getElementById('edit-name')?.value.trim();
  const role=document.getElementById('edit-role')?.value.trim();
  const dept=document.getElementById('edit-dept')?.value.trim();
  if(!name){alert('Name cannot be empty.');return;}
  const idx=state.employees.findIndex(e=>e.id===id);
  if(idx>-1){state.employees[idx]={...state.employees[idx],name,role:role||'',dept:dept||''};sbUpsertEmployee(state.employees[idx]);}
  state.editingEmpId=null;saveLS();render();
}
function askDelete(id){state.confirmDeleteId=id;state.editingEmpId=null;render()}
function cancelDelete(){state.confirmDeleteId=null;render()}
function confirmDelete(id){
  if(state.selectedEmp===id)state.selectedEmp=null;
  state.employees=state.employees.filter(e=>e.id!==id);
  delete state.records[id];
  state.confirmDeleteId=null;
  sbDeleteEmployee(id);
  saveLS();render();
}
function clockOut(empId,date){setR(empId,date,{clockOut:nowTime()})}
function handleStatus(empId,date,sel){
  const status=sel.value;if(!status)return;
  const existing=getR(empId,date);const update={status};
  if((status==='present'||status==='wfh')&&!existing.clockIn)update.clockIn=nowTime();
  if(status==='absent'||status==='leave'){update.clockIn=null;update.clockOut=null;}
  setR(empId,date,update);
}
function saveClockTimes(empId,date){
  const cin=document.getElementById('cin-inp')?.value;const cout=document.getElementById('cout-inp')?.value;
  setR(empId,date,{clockIn:cin||null,clockOut:cout||null});
}
function loadSample(){state.employees=SEMP;state.records=seedRecs(SEMP);saveLS();sbUpsertEmployees(SEMP);render()}
function addEmpPrompt(){
  const name=prompt('Full name:');if(!name)return;
  const role=prompt('Role:'),dept=prompt('Department:'),id='e'+Date.now();
  const emp={id,name:name.trim(),role:role||'',dept:dept||''};
  state.employees.push(emp);
  if(!state.records[id])state.records[id]={};
  sbUpsertEmployee(emp);
  saveLS();render();
}

loadLS();render();
</script>
